<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escáner QR PRO</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family: Arial; text-align:center; background:#111; color:white; }
#reader { width:300px; margin:auto; }
.card { padding:15px; border-radius:10px; margin-top:10px; }
.ok { background:green; }
.error { background:red; }
.duplicado { background:orange; }
</style>
</head>

<body>

<h2>📷 Escáner QR PRO</h2>
<div id="reader"></div>
<div id="resultado" class="card">Activando cámara...</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzZvJJGdl9-2IGjP-KFAu2coTeD3ReZ0rPq71MvwNxj5GMPDpL_apZxc4wFUfUXymkH/exec";

function mostrar(data) {
  const div = document.getElementById("resultado");
  div.className = "card";

  if (data.status === "ok") {
    div.classList.add("ok");
    div.innerHTML = "✅ " + data.nombre + "<br>" + data.area;
  } else if (data.status === "duplicado") {
    div.classList.add("duplicado");
    div.innerHTML = "⚠️ YA REGISTRADO";
  } else {
    div.classList.add("error");
    div.innerHTML = "❌ " + data.mensaje;
  }
}

function onScanSuccess(code) {
  fetch(URL, {
    method: "POST",
    body: JSON.stringify({ codigo: code })
  })
  .then(r => r.json())
  .then(d => mostrar(d));
}

const qr = new Html5Qrcode("reader");
qr.start(
  { facingMode: "environment" },
  { fps: 10, qrbox: 250 },
  onScanSuccess
);
</script>

</body>
</html>
